<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morse Decoder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323:wght@400&display=swap" rel="stylesheet">
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    :root {
      --green:       #00ff88;
      --green-dim:   #004d29;
      --green-mid:   #00994d;
      --green-glow:  #00ffaa33;
      --amber:       #ffb000;
      --bg:          #040a06;
      --bg-panel:    #060e08;
      --border:      #0a2e14;
      --border-hi:   #0f5022;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--green);
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
    }

    /* ── CRT scanline overlay ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.08) 3px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Layout ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 10px;
      gap: 8px;
    }

    /* ── Header bar ── */
    #header {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 8px 16px;
      border: 1px solid var(--border-hi);
      background: var(--bg-panel);
      flex-shrink: 0;
    }

    #title {
      font-family: 'VT323', monospace;
      font-size: 26px;
      letter-spacing: 6px;
      color: var(--green);
      text-shadow: 0 0 12px var(--green);
      margin-right: auto;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      min-width: 70px;
    }
    .stat-label {
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--green-mid);
    }
    .stat-value {
      font-family: 'VT323', monospace;
      font-size: 24px;
      color: var(--green);
      text-shadow: 0 0 8px var(--green-glow);
    }

    /* Signal bar */
    #signal-bar {
      display: flex;
      gap: 3px;
      align-items: flex-end;
    }
    .seg {
      width: 7px;
      background: var(--green-dim);
      transition: background 0.12s, box-shadow 0.12s;
      border-radius: 1px;
    }
    .seg.lit {
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
    }
    /* Segments get taller as signal gets stronger */
    .seg:nth-child(1)  { height: 6px;  }
    .seg:nth-child(2)  { height: 7px;  }
    .seg:nth-child(3)  { height: 9px;  }
    .seg:nth-child(4)  { height: 11px; }
    .seg:nth-child(5)  { height: 13px; }
    .seg:nth-child(6)  { height: 14px; }
    .seg:nth-child(7)  { height: 16px; }
    .seg:nth-child(8)  { height: 18px; }
    .seg:nth-child(9)  { height: 20px; }
    .seg:nth-child(10) { height: 22px; }

    /* Key indicator — flashes when tone is active */
    #key-indicator {
      width: 14px; height: 14px;
      border-radius: 50%;
      border: 1px solid var(--green-mid);
      background: transparent;
      transition: background 0.05s, box-shadow 0.05s;
    }
    #key-indicator.active {
      background: var(--green);
      box-shadow: 0 0 14px var(--green), 0 0 28px var(--green-glow);
    }

    /* ── Main content area ── */
    #main {
      display: flex;
      gap: 8px;
      flex: 1;
      min-height: 0;
    }

    /* ── Decode pane ── */
    #decode-pane {
      flex: 1;
      border: 1px solid var(--border-hi);
      background: var(--bg-panel);
      padding: 16px;
      overflow-y: auto;
      position: relative;
    }

    #decode-output {
      font-size: 22px;
      line-height: 1.9;
      letter-spacing: 2px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .cursor {
      display: inline-block;
      width: 13px;
      height: 1.1em;
      background: var(--green);
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
      box-shadow: 0 0 6px var(--green);
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* New character pop animation */
    @keyframes charPop {
      0%   { opacity: 0; text-shadow: 0 0 20px var(--green); }
      40%  { opacity: 1; text-shadow: 0 0 10px var(--green); }
      100% { opacity: 1; text-shadow: none; }
    }
    .char-new {
      animation: charPop 0.3s ease-out forwards;
    }

    /* ── Log pane ── */
    #log-pane {
      width: 290px;
      border: 1px solid var(--border-hi);
      background: var(--bg-panel);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    #log-header {
      padding: 8px 14px;
      font-family: 'VT323', monospace;
      font-size: 17px;
      letter-spacing: 3px;
      color: var(--green-mid);
      border-bottom: 1px solid var(--border);
    }

    #log-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }

    .log-entry {
      padding: 5px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--green-mid);
      transition: color 0.4s;
    }
    .log-entry.fresh {
      color: var(--green);
    }
    .log-time  { margin-right: 8px; color: var(--green-dim); }
    .log-dir   {
      font-size: 10px;
      padding: 1px 4px;
      border: 1px solid currentColor;
      margin-right: 8px;
      vertical-align: middle;
    }

    /* ── Scrollbars ── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--green-dim); border-radius: 2px; }

    /* ── Connection overlay ── */
    #conn-overlay {
      position: fixed;
      inset: 0;
      background: rgba(4, 10, 6, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      font-family: 'VT323', monospace;
      font-size: 28px;
      letter-spacing: 4px;
      color: var(--green-mid);
    }
    #conn-overlay.hidden { display: none; }
  </style>
</head>
<body>

<div id="conn-overlay">CONNECTING...</div>

<div id="app">

  <!-- ── Header ── -->
  <div id="header">
    <span id="title">MORSE DECODER</span>

    <div id="key-indicator"></div>

    <div class="stat">
      <div class="stat-label">FREQ</div>
      <div class="stat-value" id="stat-freq">--- Hz</div>
    </div>

    <div class="stat">
      <div class="stat-label">WPM</div>
      <div class="stat-value" id="stat-wpm">--</div>
    </div>

    <div class="stat">
      <div class="stat-label">SIGNAL</div>
      <div id="signal-bar"></div>
    </div>
  </div>

  <!-- ── Body ── -->
  <div id="main">

    <div id="decode-pane">
      <div id="decode-output"><span class="cursor"></span></div>
    </div>

    <div id="log-pane">
      <div id="log-header">TRAFFIC LOG</div>
      <div id="log-list"></div>
    </div>

  </div>
</div>

<script>
  // ── Signal bar setup ──────────────────────────────────────
  const sigBar = document.getElementById('signal-bar');
  for (let i = 0; i < 10; i++) {
    const s = document.createElement('div');
    s.className = 'seg';
    s.id = `seg${i}`;
    sigBar.appendChild(s);
  }

  // ── Helpers ───────────────────────────────────────────────
  const output      = document.getElementById('decode-output');
  const decodePane  = document.getElementById('decode-pane');
  const logList     = document.getElementById('log-list');
  const keyDot      = document.getElementById('key-indicator');
  const overlay     = document.getElementById('conn-overlay');

  const MAX_CHARS = 2000;

  function appendChar(ch) {
    // Remove cursor, add character span, re-add cursor
    const cursor = output.querySelector('.cursor');
    if (cursor) cursor.remove();

    const span = document.createElement('span');
    span.className = 'char-new';
    span.textContent = ch;
    output.appendChild(span);

    const newCursor = document.createElement('span');
    newCursor.className = 'cursor';
    output.appendChild(newCursor);

    // Trim old content if too long
    const text = output.textContent;
    if (text.length > MAX_CHARS) {
      output.innerHTML = '';
      const trimmed = document.createElement('span');
      trimmed.textContent = text.slice(-1500);
      output.appendChild(trimmed);
      const c2 = document.createElement('span');
      c2.className = 'cursor';
      output.appendChild(c2);
    }

    // Auto-scroll
    decodePane.scrollTop = decodePane.scrollHeight;
  }

  function updateSignal(strength) {
    const lit = Math.round(strength * 10);
    for (let i = 0; i < 10; i++) {
      document.getElementById(`seg${i}`).classList.toggle('lit', i < lit);
    }
  }

  function addLogEntry(entry, fresh = false) {
    const el = document.createElement('div');
    el.className = 'log-entry' + (fresh ? ' fresh' : '');
    const time = entry.timestamp.substr(11, 5);
    el.innerHTML =
      `<span class="log-time">${time}</span>` +
      `<span class="log-dir">${entry.direction}</span>` +
      `<span class="log-text">${escapeHtml(entry.text)}</span>`;
    logList.appendChild(el);
    logList.scrollTop = logList.scrollHeight;
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Socket.IO ─────────────────────────────────────────────
  const socket = io();

  socket.on('connect', () => {
    overlay.classList.add('hidden');
    loadLogs();
  });

  socket.on('disconnect', () => {
    overlay.classList.remove('hidden');
    overlay.textContent = 'DISCONNECTED — RECONNECTING...';
  });

  // Real-time decoded characters
  socket.on('character', data => {
    appendChar(data.char);
  });

  // Signal state: frequency, strength, key on/off, WPM
  socket.on('signal', data => {
    if (data.frequency > 0) {
      document.getElementById('stat-freq').textContent =
        data.frequency.toFixed(1) + ' Hz';
    }
    if (data.wpm > 0) {
      document.getElementById('stat-wpm').textContent = data.wpm;
    }
    updateSignal(data.strength);
    keyDot.classList.toggle('active', data.active);
  });

  // Log entries pushed on connect
  socket.on('log_entry', entry => {
    addLogEntry(entry, false);
  });

  // ── Load logs via REST ────────────────────────────────────
  async function loadLogs() {
    try {
      const r = await fetch('/api/logs?n=50');
      const entries = await r.json();
      logList.innerHTML = '';
      entries.forEach(e => addLogEntry(e, false));
    } catch (e) { /* server might not be ready yet */ }
  }

  // Refresh logs every 15 seconds
  setInterval(loadLogs, 15000);
</script>
</body>
</html>
